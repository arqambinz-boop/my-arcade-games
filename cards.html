<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeons & Drafts - Cyber Cards</title>
    <style>
        body {
            background-color: #0d0e15;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #00f0ff; margin-bottom: 5px; }
        .stats { color: #8a8fbc; margin-bottom: 20px; font-size: 1.1rem; }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            gap: 15px;
            justify-content: center;
            margin: 0 auto;
            max-width: 400px;
        }
        .card {
            width: 80px;
            height: 110px;
            background: #181a26;
            border: 2px solid #2d314d;
            border-radius: 8px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card.flipped {
            background: #202336;
            border-color: #ff007f;
        }
        .card.matched {
            background: #112624;
            border-color: #00ffcc;
            visibility: hidden; /* Hides cards when matched */
        }
    </style>
</head>
<body>

    <h1>🃏 Dungeons &amp; Drafts</h1>
    <div class="stats">Matches: <span id="matches">0</span>/4 | Flips: <span id="flips">0</span></div>

    <div class="card-grid" id="grid"></div>

    <script>
        const symbols = ['⚔️', '🛡️', '🧪', '🗝️', '⚔️', '🛡️', '🧪', '🗝️'];
        let shuffled = symbols.sort(() => 0.5 - Math.random());
        
        let flippedCards = [];
        let matchedCount = 0;
        let flipCount = 0;
        const grid = document.getElementById('grid');

        // Create Cards
        shuffled.forEach((symbol, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.symbol = symbol;
            card.dataset.index = index;
            card.innerText = '❓';
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });

        function flipCard() {
            if (flippedCards.length === 2 || this.classList.contains('flipped') || this.classList.contains('matched')) return;

            this.classList.add('flipped');
            this.innerText = this.dataset.symbol;
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                flipCount++;
                document.getElementById('flips').innerText = flipCount;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.symbol === card2.dataset.symbol) {
                setTimeout(() => {
                    card1.className = 'card matched';
                    card2.className = 'card matched';
                    matchedCount++;
                    document.getElementById('matches').innerText = matchedCount;
                    flippedCards = [];
                    if (matchedCount === 4) {
                        alert("🏆 Dungeon Cleared! You found all pairs!");
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.innerText = '❓';
                    card2.innerText = '❓';
                    flippedCards = [];
                }, 1000);
            }
        }
    </script>
</body>
</html>
