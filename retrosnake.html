<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake</title>
    <style>
        body {
            background-color: #0d0e15;
            color: #fff;
            text-align: center;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background: #181a26;
            border: 4px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            display: block;
            margin: 20px auto;
        }
        h1 { color: #ff007f; margin: 0; }
    </style>
</head>
<body>
    <h1>🐍 RETRO SNAKE</h1>
    <p>Use Arrow Keys or WASD to move. Eat the pink pixels!</p>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let count = 0;
        
        let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 320, y: 320 };

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function loop() {
            requestAnimationFrame(loop);
            if (++count < 6) return; // Controls game speed
            count = 0;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            snake.x += snake.dx;
            snake.y += snake.dy;

            // Wall collision - wrap around screen
            if (snake.x < 0) snake.x = canvas.width - grid;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - grid;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            // Draw apple
            ctx.fillStyle = '#ff007f';
            ctx.fillRect(apple.x, apple.y, grid-1, grid-1);

            // Draw snake
            ctx.fillStyle = '#00f0ff';
            snake.cells.forEach(function(cell, index) {
                ctx.fillRect(cell.x, cell.y, grid-1, grid-1);  
                // Snake ate apple
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    apple.x = getRandomInt(0, 20) * grid;
                    apple.y = getRandomInt(0, 20) * grid;
                }
                // Check collision with self
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        snake.maxCells = 4;
                        snake.x = 160; snake.y = 160;
                        snake.dx = grid; snake.dy = 0;
                        snake.cells = [];
                    }
                }
            });
        }

        document.addEventListener('keydown', function(e) {
            if ((e.which === 37 || e.which === 65) && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
            else if ((e.which === 38 || e.which === 87) && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
            else if ((e.which === 39 || e.which === 68) && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
            else if ((e.which === 40 || e.which === 83) && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
        });

        requestAnimationFrame(loop);
    </script>
</body>
</html>
