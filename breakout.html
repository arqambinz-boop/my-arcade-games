<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Breakout</title>
    <style>
        body {
            margin: 0;
            background-color: #050508;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 3px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            background-color: #0a0a14;
        }
        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="ui" style="position: absolute; top: 20px; font-size: 20px; width: 800px; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; color: #ff00ff; text-shadow: 0 0 10px #ff00ff;">
    <div id="scoreDisplay">SCORE: 0</div>
    <div id="livesDisplay">LIVES: 3</div>
</div>

<canvas id="gameCanvas" width="800" height="500"></canvas>
<div class="instructions">Move your <b>MOUSE</b> left and right to control the paddle!</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let score = 0;
let lives = 3;
let gameOver = false;
let gameWon = false;

// Paddle setup
const paddle = {
    width: 100,
    height: 15,
    x: 350,
    y: 460
};

// Ball setup
const ball = {
    x: 400,
    y: 400,
    radius: 8,
    dx: 4,
    dy: -4
};

// Bricks configuration
const brickRowCount = 4;
const brickColumnCount = 9;
const brickWidth = 75;
const brickHeight = 20;
const brickPadding = 10;
const brickOffsetTop = 50;
const brickOffsetLeft = 25;

const bricks = [];
const colors = ['#ff0055', '#ffcc00', '#00ffcc', '#0099ff'];

for (let c = 0; c < brickColumnCount; c++) {
    bricks[c] = [];
    for (let r = 0; r < brickRowCount; r++) {
        bricks[c][r] = { x: 0, y: 0, status: 1, color: colors[r] };
    }
}

// Track Mouse for Paddle Control
window.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const rootX = e.clientX - rect.left;
    paddle.x = rootX - paddle.width / 2;
    
    // Keep paddle inside canvas boundaries
    if (paddle.x < 0) paddle.x = 0;
    if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
});

window.addEventListener('mousedown', () => {
    if (gameOver || gameWon) {
        document.location.reload();
    }
});

function collisionDetection() {
    let activeBricks = 0;
    for (let c = 0; c < brickColumnCount; c++) {
        for (let r = 0; r < brickRowCount; r++) {
            let b = bricks[c][r];
            if (b.status === 1) {
                activeBricks++;
                // Check if ball hits brick bounds
                if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
                    ball.dy = -ball.dy;
                    b.status = 0;
                    score += 20;
                }
            }
        }
    }
    if (activeBricks === 0) {
        gameWon = true;
    }
}

function update() {
    if (gameOver || gameWon) return;

    // Ball movement
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Wall bounce (Left/Right)
    if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
        ball.dx = -ball.dx;
    }
    // Wall bounce (Top)
    if (ball.y + ball.dy < ball.radius) {
        ball.dy = -ball.dy;
    }

    // Paddle bounce
    if (ball.y + ball.dy > paddle.y - ball.radius) {
        if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
            // Change angle based on where the ball hits the paddle
            let hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
            ball.dx = hitPos * 5;
            ball.dy = -Math.abs(ball.dy); // Push up
        } else if (ball.y + ball.dy > canvas.height) {
            // Out of bounds bottom
            lives--;
            if (lives <= 0) {
                gameOver = true;
            } else {
                // Reset ball position
                ball.x = canvas.width / 2;
                ball.y = 400;
                ball.dx = 4;
                ball.dy = -4;
            }
        }
    }

    collisionDetection();
    document.getElementById('scoreDisplay').innerText = "SCORE: " + score;
    document.getElementById('livesDisplay').innerText = "LIVES: " + lives;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameOver) {
        ctx.fillStyle = '#ff3333';
        ctx.font = '36px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
        ctx.font = '18px Courier New';
        ctx.fillText("Click to Play Again", canvas.width / 2, canvas.height / 2 + 40);
        return;
    }

    if (gameWon) {
        ctx.fillStyle = '#00ffcc';
        ctx.font = '36px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("STAGE CLEARED!", canvas.width / 2, canvas.height / 2);
        ctx.font = '18px Courier New';
        ctx.fillText("Click to Restart", canvas.width / 2, canvas.height / 2 + 40);
        return;
    }

    // Draw Bricks
    for (let c = 0; c < brickColumnCount; c++) {
        for (let r = 0; r < brickRowCount; r++) {
            if (bricks[c][r].status === 1) {
                let brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                let brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                bricks[c][r].x = brickX;
                bricks[c][r].y = brickY;
                ctx.fillStyle = bricks[c][r].color;
                ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
            }
        }
    }

    // Draw Paddle
    ctx.fillStyle = '#ff00ff';
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

    // Draw Ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
